# dbgaming 静态站点 Nginx 配置示例
# 使用前请替换：
#   - server_name
#   - root（dist 解压后的绝对路径）
#   - ssl_certificate / ssl_certificate_key（如启用 HTTPS）

server {
    listen 80;
    server_name dbgaming.example.com;

    # dist 目录解压路径，按实际部署位置修改
    root /var/www/dbgaming/dist;
    index index.html;

    # 开启 gzip，减小静态资源传输体积
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 静态资源长缓存（文件名带 hash，可安全长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理（替代 Vite dev server 的 proxy）
    # 前端请求 /api/obgm/... → https://api.obgm.com/...
    location /api/obgm/ {
        proxy_pass https://api.obgm.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.obgm.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 路由回退：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全响应头（可按需调整）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

